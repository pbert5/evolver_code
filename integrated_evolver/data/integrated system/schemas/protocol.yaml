id: https://w3id.org/evolver/integrated-system/protocol
name: integrated_evolver_protocol
title: Integrated eVOLVER Protocol Schema
imports:
  - linkml:types
  - base
  - hardware
  - inventory
  - calibration
  - actions
  - algorithms
prefixes:
  linkml: https://w3id.org/linkml/
  evolver: https://w3id.org/evolver/
default_prefix: evolver
default_range: string

classes:
  Protocol:
    is_a: NamedEntity
    description: Experimental protocol template.
    attributes:
      protocol_type:
        range: ExperimentTypeEnum
        required: true
      version:
      total_duration:
        range: Quantity
        inlined: true
      duration_resolution:
        range: DurationResolutionEnum
      required_device_types:
        range: DeviceTypeEnum
        multivalued: true
      required_component_types:
        range: ComponentTypeEnum
        multivalued: true
      required_materials:
        range: MaterialRequirement
        multivalued: true
        inlined_as_list: true
      initial_conditions:
        range: InitialCondition
        multivalued: true
        inlined_as_list: true
      steps:
        range: ProtocolStep
        multivalued: true
        inlined_as_list: true
      inventory_timeline:
        range: InventoryTimelineEvent
        multivalued: true
        inlined_as_list: true
      algorithm_id:
        range: Algorithm
      documentation_ids:
        range: DocumentationReference
        multivalued: true

  MaterialRequirement:
    description: Material needed by a protocol or step.
    attributes:
      material_id:
        range: Material
      material_type:
        range: MaterialTypeEnum
      role:
        range: MaterialRoleEnum
      amount:
        range: Quantity
        inlined: true
      required_by_step_id:
        range: ProtocolStep
      replacement_policy:
        range: ExpirationPolicy
        inlined: true
      formula:
        description: Human-readable expression for derived requirements.
      placeholder_allowed:
        range: boolean
        description: True when a protocol template may declare only the required class of material.
      user_fill_required:
        range: boolean
        description: True when the user must bind a concrete material/sample during experiment setup.
      run_blocking_if_unresolved:
        range: boolean
        description: True when an unresolved placeholder must prevent experiment execution.

  InitialCondition:
    description: Starting setpoint or starting state for an experiment.
    attributes:
      parameter:
        range: ParameterKindEnum
        required: true
      value:
        range: Quantity
        inlined: true
      target_component_id:
        range: Component
      target_device_id:
        range: Device
      notes:

  ProtocolStep:
    is_a: NamedEntity
    description: Step within a protocol.
    attributes:
      step_type:
        range: StepTypeEnum
        required: true
      execution_mode:
        range: StepExecutionModeEnum
        required: true
      order_index:
        range: integer
      expected_duration:
        range: Quantity
        inlined: true
      component_configurations:
        range: ComponentConfiguration
        multivalued: true
        inlined_as_list: true
      fixed_parameters:
        range: FixedParameter
        multivalued: true
        inlined_as_list: true
      runtime_parameters:
        range: RuntimeParameter
        multivalued: true
        inlined_as_list: true
      material_inputs:
        range: MaterialInput
        multivalued: true
        inlined_as_list: true
      inventory_requirements:
        range: MaterialRequirement
        multivalued: true
        inlined_as_list: true
      gates:
        range: ProgressionGate
        multivalued: true
        inlined_as_list: true
      objectives:
        range: Objective
        multivalued: true
        inlined_as_list: true
      action_ids:
        range: ActionTemplate
        multivalued: true
      documentation_ids:
        range: DocumentationReference
        multivalued: true

  ComponentConfiguration:
    description: How a component is configured and connected for a protocol or run.
    attributes:
      component_id:
        range: Component
        required: true
      connected_to_ids:
        multivalued: true
      role:
      settings:
        range: ParameterSetting
        multivalued: true
        inlined_as_list: true

  MaterialInput:
    description: Material or mixture consumed by a step.
    attributes:
      input_type:
        range: MaterialInputTypeEnum
        required: true
      controlled_by_evolver:
        range: boolean
        required: true
      material_id:
        range: Material
      mixture:
        range: Recipe
        inlined: true
      source_container_id:
        range: Container
      destination_container_id:
        range: Container
      connected_component_id:
        range: Component
      amount:
        range: Quantity
        inlined: true
      manual_instructions:

  ProgressionGate:
    description: Condition required before a step can proceed.
    attributes:
      gate_type:
        range: GateTypeEnum
        required: true
      parameter:
        range: ParameterKindEnum
      comparator:
        range: ComparatorEnum
      threshold:
        range: Quantity
        inlined: true
      source_component_id:
        range: Component
      user_prompt:
      timeout:
        range: Quantity
        inlined: true

  Objective:
    description: Control objective for a protocol step.
    attributes:
      objective_type:
        range: ObjectiveTypeEnum
        required: true
      parameter:
        range: ParameterKindEnum
      target:
        range: Quantity
        inlined: true
      lower_bound:
        range: Quantity
        inlined: true
      upper_bound:
        range: Quantity
        inlined: true
      modification_strategy:
        range: ModificationStrategy
        inlined: true

  ModificationStrategy:
    description: How an objective should change the system.
    attributes:
      strategy_type:
        range: ModificationStrategyTypeEnum
      action_id:
        range: ActionTemplate
      component_id:
        range: Component
      material_id:
        range: Material
      notes:

  InventoryTimelineEvent:
    description: Derived or explicit inventory change over protocol time.
    attributes:
      time_window:
        range: TimeWindow
        inlined: true
      material_id:
        range: Material
      container_id:
        range: Container
      expected_change:
        range: Quantity
        inlined: true
      reason:
      replacement_due:
        range: boolean
      derived_from:

enums:
  ExperimentTypeEnum:
    permissible_values:
      growth_curve: {}
      chemostat: {}
      turbidostat: {}
      morbidostat: {}
      epace: {}
      calibration_run: {}
      maintenance_run: {}
      custom: {}

  DurationResolutionEnum:
    permissible_values:
      explicitly_set: {}
      solved_from_steps: {}
      indefinite_until_gate: {}
      manual: {}

  StepTypeEnum:
    permissible_values:
      setup_connections: {}
      prepare_media: {}
      load_vials: {}
      set_initial_conditions: {}
      calibrate_temperature: {}
      calibrate_od: {}
      calibrate_od_blank: {}
      calibrate_pump: {}
      prime_pumps: {}
      inoculate: {}
      monitor_growth: {}
      maintain_od: {}
      chemostat_dilution: {}
      turbidostat_dilution: {}
      sample_collection: {}
      cleanup: {}
      manual_gate: {}
      custom: {}

  StepExecutionModeEnum:
    permissible_values:
      automatic: {}
      manual: {}
      interactive: {}
      one_shot: {}
      background_control_loop: {}

  MaterialInputTypeEnum:
    permissible_values:
      single_material: {}
      input_mixture: {}
      manual_addition: {}
      pump_controlled: {}
      initial_fill: {}
      sample_spike: {}

  GateTypeEnum:
    permissible_values:
      time_elapsed: {}
      parameter_threshold: {}
      user_confirmation: {}
      manual_input: {}
      calibration_valid: {}
      inventory_available: {}
      component_ready: {}
      no_gate: {}

  ObjectiveTypeEnum:
    permissible_values:
      maintain_parameter: {}
      reach_threshold: {}
      collect_data: {}
      perform_dilution: {}
      keep_volume_constant: {}
      wait_for_user: {}
      calibrate: {}

  ModificationStrategyTypeEnum:
    permissible_values:
      add_media: {}
      remove_waste: {}
      run_pump_forward: {}
      run_pump_backward: {}
      change_temperature: {}
      change_stir_rate: {}
      prompt_user: {}
      no_feedback: {}
