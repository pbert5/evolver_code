id: https://w3id.org/evolver/integrated-system/inventory
name: integrated_evolver_inventory
title: Integrated eVOLVER Inventory Schema
imports:
  - linkml:types
  - base
  - hardware
prefixes:
  linkml: https://w3id.org/linkml/
  evolver: https://w3id.org/evolver/
default_prefix: evolver
default_range: string

classes:
  Container:
    is_a: NamedEntity
    description: Physical container for culture, media, waste, sample, or reagent.
    attributes:
      container_type:
        range: ContainerTypeEnum
        required: true
      volume_capacity:
        range: Quantity
        inlined: true
      current_volume:
        range: Quantity
        inlined: true
      material_id:
        range: Material
      sample_id:
        range: ResearchSample
      storage_condition:
        range: StorageCondition
        inlined: true
      connected_component_ids:
        range: Component
        multivalued: true
      expires_at:
        range: datetime
      opened_at:
        range: datetime

  Material:
    is_a: NamedEntity
    description: Media, reagent, waste, sample-derived material, or input mixture.
    attributes:
      material_type:
        range: MaterialTypeEnum
        required: true
      lot:
      barcode:
      organism:
        description: Controlled vocabulary should align with external examples when possible.
      strain_name:
      strain_id:
      genotype:
      growth_medium:
        description: Controlled vocabulary should align with external examples when possible.
      carbon_sources:
        range: MixtureComponent
        multivalued: true
        inlined_as_list: true
      nitrogen_sources:
        range: MixtureComponent
        multivalued: true
        inlined_as_list: true
      recipe:
        range: Recipe
        inlined: true
      supply_volume:
        range: Quantity
        inlined: true
      container_count:
        range: integer
      expiration:
        range: ExpirationPolicy
        inlined: true
      storage_condition:
        range: StorageCondition
        inlined: true
      ideal_temperature:
        range: Quantity
        inlined: true
      required_conditions:
        multivalued: true
      average_doubling_time:
        range: Quantity
        inlined: true
      contamination_risk:
        range: SeverityEnum
      placeholder:
        range: boolean
        description: True when this material is a protocol/setup placeholder rather than a concrete inventory item.
      run_blocking_if_unresolved:
        range: boolean
        description: True when experiments using this placeholder cannot run until the user supplies a concrete material.
      required_setup_fields:
        multivalued: true
        description: Fields the user must fill when resolving this placeholder.

  ResearchSample:
    is_a: NamedEntity
    description: Biological sample such as bacteria, yeast, culture, or collected output.
    attributes:
      sample_type:
        range: SampleTypeEnum
      organism:
      strain_name:
      strain_id:
      genotype:
      source_material_id:
        range: Material
      parent_sample_id:
        range: ResearchSample
      starting_inoculum:
        range: StartingInoculumEnum
      growth_stage:
      density:
        range: Quantity
        inlined: true
      ideal_temperature:
        range: Quantity
        inlined: true
      average_doubling_time:
        range: Quantity
        inlined: true
      required_conditions:
        multivalued: true
      placeholder:
        range: boolean
        description: True when this sample is a protocol/setup placeholder rather than a concrete biological sample.
      run_blocking_if_unresolved:
        range: boolean
        description: True when experiments using this placeholder cannot run until the user supplies a concrete sample.
      required_setup_fields:
        multivalued: true
        description: Fields the user must fill when resolving this placeholder.

  Recipe:
    is_a: NamedEntity
    description: Recipe for media, reagent mixtures, or input mixtures.
    attributes:
      recipe_type:
        range: RecipeTypeEnum
      ingredients:
        range: MixtureComponent
        multivalued: true
        inlined_as_list: true
      preparation_steps:
        multivalued: true
      documentation_ids:
        range: DocumentationReference
        multivalued: true

  MixtureComponent:
    description: Material or reagent within a recipe or input mixture.
    attributes:
      material_id:
        range: Material
      name:
        required: true
      role:
        range: MixtureRoleEnum
      amount:
        range: Quantity
        inlined: true
      concentration:
        range: Quantity
        inlined: true
      ratio:
        range: decimal

  StorageCondition:
    description: Storage conditions for inventory and samples.
    attributes:
      temperature:
        range: Quantity
        inlined: true
      light_sensitive:
        range: boolean
      sterile_required:
        range: boolean
      atmosphere:
        range: OxygenAvailabilityEnum
      notes:

  ExpirationPolicy:
    description: When an inventory item should be replaced or discarded.
    attributes:
      expires_at:
        range: datetime
      lifetime_after_opening:
        range: Quantity
        inlined: true
      lifetime_in_run:
        range: Quantity
        inlined: true
      replacement_trigger:
        range: ReplacementTriggerEnum
      stale_after:
        range: Quantity
        inlined: true
      evaporation_sensitive:
        range: boolean
      contamination_sensitive:
        range: boolean

enums:
  ContainerTypeEnum:
    permissible_values:
      evolver_vial: {}
      media_bottle: {}
      carboy: {}
      waste_carboy: {}
      reagent_tube: {}
      sample_tube: {}
      plate_well: {}
      reservoir: {}
      other: {}

  MaterialTypeEnum:
    permissible_values:
      media: {}
      reagent: {}
      waste: {}
      sample: {}
      organism: {}
      growth_medium: {}
      carbon_source: {}
      nitrogen_source: {}
      starting_inoculum: {}
      input_mixture: {}
      culture: {}
      other: {}

  SampleTypeEnum:
    permissible_values:
      bacteria: {}
      yeast: {}
      microbial_culture: {}
      saturated_culture: {}
      log_phase_culture: {}
      environmental_sample: {}
      collected_sample: {}
      other: {}

  RecipeTypeEnum:
    permissible_values:
      media_recipe: {}
      reagent_recipe: {}
      input_mixture: {}
      sterilization_protocol: {}
      other: {}

  MixtureRoleEnum:
    permissible_values:
      solvent: {}
      growth_medium: {}
      carbon_source: {}
      nitrogen_source: {}
      buffer: {}
      selection_drug: {}
      additive: {}
      organism: {}
      reagent: {}
      other: {}

  MaterialRoleEnum:
    permissible_values:
      media_input: {}
      reagent_input: {}
      inoculum: {}
      blank_media: {}
      waste_output: {}
      culture_volume: {}
      collected_sample: {}
      cleaning_solution: {}
      other: {}

  OxygenAvailabilityEnum:
    permissible_values:
      aerobic_room: {}
      aerobic_sparger: {}
      anaerobic: {}
      anaerobic_sealed: {}
      hypoxic: {}
      microaerobic: {}
      other: {}

  StartingInoculumEnum:
    permissible_values:
      colony: {}
      glycerol_stock: {}
      log_phase_culture: {}
      saturated_liquid_culture: {}
      other: {}

  ReplacementTriggerEnum:
    permissible_values:
      expiration_time: {}
      open_time: {}
      runtime_duration: {}
      consumed_volume: {}
      contamination_risk: {}
      evaporation_risk: {}
      manual_inspection: {}
