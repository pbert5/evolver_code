id: https://w3id.org/evolver/integrated-system/hardware
name: integrated_evolver_hardware
title: Integrated eVOLVER Hardware Schema
imports:
  - linkml:types
  - base
prefixes:
  linkml: https://w3id.org/linkml/
  evolver: https://w3id.org/evolver/
default_prefix: evolver
default_range: string

classes:
  EvolverUnit:
    is_a: NamedEntity
    description: A physical eVOLVER, min-eVOLVER, simulator, or custom unit.
    attributes:
      unit_type:
        range: EvolverUnitTypeEnum
        required: true
      serial_number:
      location:
      state:
        range: OperationalStateEnum
      connected_device_ids:
        range: Device
        multivalued: true
      connected_component_ids:
        range: Component
        multivalued: true
      supported_action_ids:
        range: ActionTemplate
        multivalued: true
      notes:

  Device:
    is_a: NamedEntity
    description: Physical or logical hardware device managed or observed by the system.
    attributes:
      device_type:
        range: DeviceTypeEnum
        required: true
      manufacturer:
      model:
      serial_number:
      state:
        range: OperationalStateEnum
      parent_unit_id:
        range: EvolverUnit
      component_ids:
        range: Component
        multivalued: true
      connection_ids:
        range: Connection
        multivalued: true
      action_template_ids:
        range: ActionTemplate
        multivalued: true
      calibration_ids:
        range: CalibrationRecord
        multivalued: true
      current_activity:
      last_used_at:
        range: datetime
      last_used_for_experiment_id:
        range: Experiment
      history:
        range: DeviceEvent
        multivalued: true
        inlined_as_list: true
      maintenance_flags:
        range: MaintenanceFlag
        multivalued: true
        inlined_as_list: true

  Component:
    is_a: NamedEntity
    description: Functional part of a device or eVOLVER unit.
    attributes:
      component_type:
        range: ComponentTypeEnum
        required: true
      direction:
        range: ComponentDirectionEnum
      parent_device_id:
        range: Device
      parent_unit_id:
        range: EvolverUnit
      channel:
        description: Hardware channel, vial index, pump index, or board position.
      role:
      state:
        range: OperationalStateEnum
      accepts_parameter_ids:
        range: RuntimeParameter
        multivalued: true
      calibration_ids:
        range: CalibrationRecord
        multivalued: true
      connection_ids:
        range: Connection
        multivalued: true

  Connection:
    is_a: NamedEntity
    description: Typed edge between components, devices, containers, or materials.
    attributes:
      connection_type:
        range: ConnectionTypeEnum
        required: true
      source_id:
        required: true
      target_id:
        required: true
      source_role:
      target_role:
      medium:
        description: Fluid, signal, power, data, mechanical coupling, or other.
      directionality:
        range: DirectionalityEnum
      validated_at:
        range: datetime

  DeviceEvent:
    description: History item for device state, usage, calibration, or maintenance.
    attributes:
      event_type:
        range: DeviceEventTypeEnum
        required: true
      occurred_at:
        range: datetime
        required: true
      actor_id:
        range: PersonOrAgent
      experiment_id:
        range: Experiment
      protocol_id:
        range: Protocol
      summary:
      details:

  MaintenanceFlag:
    description: Condition that requires operator attention.
    attributes:
      flag_type:
        range: MaintenanceFlagTypeEnum
        required: true
      severity:
        range: SeverityEnum
      reason:
      triggered_by_id:
      created_at:
        range: datetime
      resolved_at:
        range: datetime

enums:
  EvolverUnitTypeEnum:
    permissible_values:
      evolver: {}
      min_evolver: {}
      simulator: {}
      custom: {}

  DeviceTypeEnum:
    permissible_values:
      bioreactor: {}
      peristaltic_pump: {}
      pump_rack: {}
      temperature_controller: {}
      od_sensor: {}
      temperature_sensor: {}
      stirrer: {}
      heatplate: {}
      vial: {}
      vial_cap: {}
      smart_sleeve: {}
      fluidics_box: {}
      waste_container: {}
      media_container: {}
      server: {}
      control_computer: {}
      arduino: {}
      other: {}

  ComponentTypeEnum:
    permissible_values:
      stirbar: {}
      heatplate: {}
      od_sensor: {}
      temperature_sensor: {}
      peristaltic_pump: {}
      pump_influx: {}
      pump_efflux: {}
      vial: {}
      cap: {}
      tubing: {}
      connector: {}
      live_parameter: {}
      fixed_parameter: {}
      sensor_channel: {}
      actuator_channel: {}
      software_service: {}
      other: {}

  ComponentDirectionEnum:
    permissible_values:
      input: {}
      output: {}
      bidirectional: {}
      internal: {}

  ConnectionTypeEnum:
    permissible_values:
      fluidic: {}
      electrical: {}
      data: {}
      mechanical: {}
      logical: {}
      containment: {}
      calibration_target: {}

  DirectionalityEnum:
    permissible_values:
      source_to_target: {}
      target_to_source: {}
      bidirectional: {}
      undirected: {}

  DeviceEventTypeEnum:
    permissible_values:
      configured: {}
      started: {}
      stopped: {}
      calibrated: {}
      used: {}
      cleaned: {}
      repaired: {}
      failed: {}
      replaced: {}
      inspected: {}

  MaintenanceFlagTypeEnum:
    permissible_values:
      calibration_needed: {}
      replacement_needed: {}
      cleaning_needed: {}
      expired_inventory: {}
      low_inventory: {}
      possible_contamination: {}
      stale_material: {}
      pump_prime_needed: {}
      connection_check_needed: {}
