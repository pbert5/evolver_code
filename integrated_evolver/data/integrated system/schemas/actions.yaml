id: https://w3id.org/evolver/integrated-system/actions
name: integrated_evolver_actions
title: Integrated eVOLVER Actions Schema
imports:
  - linkml:types
  - base
  - hardware
prefixes:
  linkml: https://w3id.org/linkml/
  evolver: https://w3id.org/evolver/
default_prefix: evolver
default_range: string

classes:
  ActionTemplate:
    is_a: NamedEntity
    description: One-shot or long-running action triggered by UI, CLI, or automation.
    attributes:
      action_type:
        range: ActionTypeEnum
        required: true
      target_device_type:
        range: DeviceTypeEnum
      target_component_type:
        range: ComponentTypeEnum
      command:
        description: Shell command, API operation, or supervisor action identifier.
      command_kind:
        range: CommandKindEnum
      parameters:
        range: RuntimeParameter
        multivalued: true
        inlined_as_list: true
      requires_confirmation:
        range: boolean
      operator_visible:
        range: boolean
      documentation_ids:
        range: DocumentationReference
        multivalued: true

  ActionExecution:
    description: Concrete execution of an action.
    attributes:
      action_id:
        range: ActionTemplate
        required: true
      requested_at:
        range: datetime
      started_at:
        range: datetime
      completed_at:
        range: datetime
      requested_by_id:
        range: PersonOrAgent
      target_id:
      status:
        range: ActionStatusEnum
      inputs:
        range: ParameterSetting
        multivalued: true
        inlined_as_list: true
      output_summary:
      log_uri:
        range: uri

enums:
  ActionTypeEnum:
    permissible_values:
      prime_pump: {}
      run_pump_forward: {}
      run_pump_backward: {}
      fill_vial: {}
      drain_vial: {}
      set_temperature: {}
      set_stir_rate: {}
      calibrate: {}
      start_service: {}
      stop_service: {}
      restart_service: {}
      shell_command: {}
      operator_prompt: {}
      custom: {}

  CommandKindEnum:
    permissible_values:
      shell: {}
      control_api: {}
      supervisor_action: {}
      hardware_command: {}
      tui_internal: {}
      documentation_only: {}

  ActionStatusEnum:
    permissible_values:
      requested: {}
      approved: {}
      running: {}
      succeeded: {}
      failed: {}
      cancelled: {}
