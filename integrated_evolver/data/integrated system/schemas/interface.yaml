id: https://w3id.org/evolver/integrated-system/interface
name: integrated_evolver_interface
title: Integrated eVOLVER Interface Schema
imports:
  - linkml:types
  - base
  - actions
prefixes:
  linkml: https://w3id.org/linkml/
  evolver: https://w3id.org/evolver/
default_prefix: evolver
default_range: string

classes:
  DocumentationReference:
    is_a: NamedEntity
    description: Documentation item shown when relevant in context panes or forms.
    attributes:
      doc_type:
        range: DocumentationTypeEnum
      uri:
        range: uri
      applies_to_classes:
        multivalued: true
      applies_to_ids:
        multivalued: true
      summary:
      citation:

  FormDefinition:
    is_a: NamedEntity
    description: Form schema binding for TUI or web UI creation/edit flows.
    attributes:
      target_class:
        required: true
      mode:
        range: FormModeEnum
      fields:
        range: FormField
        multivalued: true
        inlined_as_list: true
      submit_action_id:
        range: ActionTemplate

  FormField:
    description: UI field bound to a schema path.
    attributes:
      path:
        required: true
      label:
        required: true
      widget:
        range: FormWidgetEnum
      required:
        range: boolean
      enum_source:
      help_documentation_id:
        range: DocumentationReference

enums:
  DocumentationTypeEnum:
    permissible_values:
      protocol: {}
      setup_guide: {}
      calibration_guide: {}
      troubleshooting: {}
      formula: {}
      safety_note: {}
      external_reference: {}

  FormModeEnum:
    permissible_values:
      create: {}
      edit: {}
      inspect: {}
      action_popup: {}

  FormWidgetEnum:
    permissible_values:
      text: {}
      textarea: {}
      number: {}
      select: {}
      multiselect: {}
      checkbox: {}
      date: {}
      datetime: {}
      reference_picker: {}
