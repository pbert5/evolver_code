id: https://w3id.org/evolver/integrated-system
name: integrated_evolver_schema
title: Integrated eVOLVER System Schema
description: >
  Root LinkML schema for integrated eVOLVER configuration, inventory,
  protocols, calibrations, experiments, runtime actions, algorithms, forms, and
  documentation references.
license: MIT
version: 0.1.0
imports:
  - linkml:types
  - schemas/base
  - schemas/hardware
  - schemas/inventory
  - schemas/calibration
  - schemas/actions
  - schemas/algorithms
  - schemas/protocol
  - schemas/experiment
  - schemas/interface
prefixes:
  linkml: https://w3id.org/linkml/
  evolver: https://w3id.org/evolver/
  schema: https://schema.org/
default_prefix: evolver
default_range: string

classes:
  IntegratedEvolverSystem:
    tree_root: true
    description: Root document for one integrated eVOLVER installation or dataset.
    attributes:
      id:
        identifier: true
        required: true
      name:
        required: true
      schema_version:
        required: true
      description:
      evolver_units:
        range: EvolverUnit
        multivalued: true
        inlined_as_list: true
      devices:
        range: Device
        multivalued: true
        inlined_as_list: true
      components:
        range: Component
        multivalued: true
        inlined_as_list: true
      containers:
        range: Container
        multivalued: true
        inlined_as_list: true
      materials:
        range: Material
        multivalued: true
        inlined_as_list: true
      samples:
        range: ResearchSample
        multivalued: true
        inlined_as_list: true
      calibrations:
        range: CalibrationRecord
        multivalued: true
        inlined_as_list: true
      protocols:
        range: Protocol
        multivalued: true
        inlined_as_list: true
      experiments:
        range: Experiment
        multivalued: true
        inlined_as_list: true
      action_templates:
        range: ActionTemplate
        multivalued: true
        inlined_as_list: true
      algorithms:
        range: Algorithm
        multivalued: true
        inlined_as_list: true
      forms:
        range: FormDefinition
        multivalued: true
        inlined_as_list: true
      documentation:
        range: DocumentationReference
        multivalued: true
        inlined_as_list: true
