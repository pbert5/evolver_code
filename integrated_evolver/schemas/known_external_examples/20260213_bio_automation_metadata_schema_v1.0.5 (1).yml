slots:
  unique_id:
    description: A short, unique name for the sample will appear in plate builder
      when assigning samples to plate wells
    title: unique_id
    from_schema: TEMP
    slot_group: Sample ID
  sample_description:
    description: Brief description of sample
    title: Sample Description
    from_schema: TEMP
    slot_group: Sample Details
  parent_barcode:
    description: Parent barcode for related sample (eg culture plate barcode is entered
      for OD plate so OD data is linked to culture plate). For ALE, parent barcode
      is the original culture plate barcode before any passaging.
    title: Sample Parent Barcode
    from_schema: TEMP
    slot_group: Sample Details
  organism:
    description: Name of organism in sample well. Controlled vocabulary.
    title: Organism
    from_schema: TEMP
    slot_group: Sample Details
