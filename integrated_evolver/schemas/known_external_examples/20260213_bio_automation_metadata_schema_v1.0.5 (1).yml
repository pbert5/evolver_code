    - reagent_9_concentration
    - reagent_9_concentration_units
    - reagent_10_barcode
    - reagent_10_name
    - reagent_10_concentration
    - reagent_10_concentration_units
    - growth_medium
    - growth_medium_lot
    - carbon_source_1
    - carbon_source_1_concentration
    - carbon_source_1_concentration_units
    - carbon_source_2
    - carbon_source_2_concentration
    - carbon_source_2_concentration_units
    - carbon_source_3
    - carbon_source_3_concentration
    - carbon_source_3_concentration_units
    - nitrogen_source_1
    - nitrogen_source_1_concentration
    - nitrogen_source_1_concentration_units
    - nitrogen_source_2
    - nitrogen_source_2_concentration
    - nitrogen_source_2_concentration_units
    - nitrogen_source_3
    - nitrogen_source_3_concentration
    - nitrogen_source_3_concentration_units
