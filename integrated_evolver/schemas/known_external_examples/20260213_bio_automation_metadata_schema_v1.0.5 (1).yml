    slot_usage:
      unique_id:
        required: true
      sample_description:
        required: false
        recommended: true
      parent_barcode:
        required: false
        recommended: true
      organism:
        required: true
      straindb_id:
        required: true
      ALE_starting_straindb_id:
        required: true
      ALE_passage_number:
        required: true
      reagent_1_barcode:
        required: false
        recommended: true
      reagent_1_name:
