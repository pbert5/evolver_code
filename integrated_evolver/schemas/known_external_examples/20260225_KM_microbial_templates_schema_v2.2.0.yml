id: TEMP
imports:
- linkml:types
name: TEMP
prefixes:
  TEMP: https://example.org/TEMP/
  linkml: https://w3id.org/linkml/
slots:
  additional_experimental_details:
    description: Include any additional information on the experimental design that
      is important for understanding the experiment (e.g. concentration of added amino
      acids).
    from_schema: TEMP
    slot_group: Sample Details
    title: Additional Experimental Details
  additional_replicate_information:
    description: Include any important information on the nature of the sample in
      terms of replication status (e.g. what makes it a techincal replicate)
    from_schema: TEMP
    slot_group: Sample Details
    title: Additional Replicate Information
  antibody_source:
    description: Indicate the source of the antibody used. If purchased, indicate
      product number. If locally sourced, indicate relavant information (bleed number,
      company, etc)
    from_schema: TEMP
    slot_group: Culture Parameters
    title: Antibody Source
  antibody_used:
    description: Indicate the antibody used for immunoprecipitation
    from_schema: TEMP
    slot_group: Culture Parameters
    title: Antibody Used
  carbon_source:
    description: The carbon source present in the growth medium for the culture. Vocabulary
      is controlled.
    from_schema: TEMP
    range: carbon_source_enum
    slot_group: Culture Parameters
    title: Carbon Source
  collection_date:
    description: Date of collection. Format (Year/Month/Day)
    from_schema: TEMP
    slot_group: Sample Details
    title: Date of collection / experiment
  culture_density:
    description: Density of the culture at collection, in OD600, Klett units, or CFU/mL
    from_schema: TEMP
    slot_group: Culture Parameters
    title: Culture Density at Collection
  drug_concentration:
    description: If drug used in growth medium, please give the concentration (mg/L
      or molarity)
    from_schema: TEMP
    slot_group: Culture Parameters
    title: Media Drug Concentration
  experiment_category:
    description: A term (or phrase) to describe the general experiment type. Vocabulary
      is controlled.
    from_schema: TEMP
    range: experiment_category_enum
    slot_group: Experiment Set Details
    title: Experiment Category
  experiment_set_description:
    description: Description of the Experiment_Set; may include experimental design,
      rationale, etc. Write a description so someone in 5 years can understand why
      the experiment was performed.
    from_schema: TEMP
    slot_group: Experiment Set Details
    title: Experiment Set Description
  experiment_set_name:
    description: Unique descriptive name of a set of samples to be analyzed together.
      Note on Data Catalog, this can be entered when the expeirment set is created.
    from_schema: TEMP
    slot_group: Experiment Set Details
    title: Experiment Set Name
  experiment_subcategory:
    description: A term (or phrase) to describe the experiment type more specifically.
      Free text. (e.g. gene over-expression, gene deletion, oxidative stress response)
    from_schema: TEMP
    slot_group: Experiment Set Details
    title: Experiment Subcategory
  experimenter_name:
    description: Enter the name(s) of the experimenters primarily responsible for
      the sample. Note on Data Catalog, this will be recorded by whomever creates
      the experiment set.
    from_schema: TEMP
    slot_group: Experiment Set Details
    title: Experimenter Name
  growth_medium:
    description: The base growth medium for the culture. Vocabulary is controlled.
    from_schema: TEMP
    range: growth_medium_enum
    slot_group: Culture Parameters
    title: Base Growth Medium
  growth_method:
    description: Growth method used for the culture. Vocabulary is controlled.
    from_schema: TEMP
    range: growth_method_enum
    slot_group: Culture Parameters
    title: Growth Method
  growth_stage:
    description: The stage of growth for the culture when the sample was taken. Vocabulary
      is controlled.
    from_schema: TEMP
    range: growth_stage_enum
    slot_group: Culture Parameters
    title: Growth Stage at Collection
  growth_temperature:
    description: Growth temperature used for the culture, in degrees C.
    from_schema: TEMP
    range: integer
    slot_group: Culture Parameters
    title: Growth Temperature
  harvest_method:
    description: How was the culture sample was harvested (e.g. spin and flash freeze
      pellet in liquid nitrogen)
    from_schema: TEMP
    slot_group: Culture Parameters
    title: Harvest Method
  lab:
    description: Indicate the lab were the experiment primarily resides. Vocabulary
      is controlled. Note on Data Catalog, this will be recorded based on whomever
      creates the experiment set.
    from_schema: TEMP
    range: lab_enum
    slot_group: Experiment Set Details
    title: Lab
  length_of_growth_until_collection:
    description: Time or number of doublings of the culture. Please indicate units.
    from_schema: TEMP
    slot_group: Culture Parameters
    title: Length of Growth Until Collection
  library_made_by:
    description: The person or sequencing center who prepared the sequencing library
    from_schema: TEMP
    slot_group: Library and Sequencing Details
    title: Library made by
  library_prep_protocol:
    description: Protocol used for preparing the sequencing libarary. Reference an
      PDF uploaded to Data Catalog Expierment or Freely and Easily Available Online
    from_schema: TEMP
    slot_group: Library and Sequencing Details
    title: Library Prep Protocol
  library_strandedness:
    description: The stradedness of the sequencing library. Vocabulary is controlled.
    from_schema: TEMP
    range: library_strandedness_enum
    slot_group: Library and Sequencing Details
    title: Library Strandedness
  material_collected_by:
    description: The person who isolated the material used for sequencing.
