id: https://w3id.org/evolver/integrated-system/algorithms
name: integrated_evolver_algorithms
title: Integrated eVOLVER Algorithms Schema
imports:
  - linkml:types
  - base
  - actions
prefixes:
  linkml: https://w3id.org/linkml/
  evolver: https://w3id.org/evolver/
default_prefix: evolver
default_range: string

classes:
  Algorithm:
    is_a: NamedEntity
    description: Algorithm used by a protocol or runtime control loop.
    attributes:
      algorithm_type:
        range: AlgorithmTypeEnum
        required: true
      input_parameters:
        range: ParameterKindEnum
        multivalued: true
      output_actions:
        range: ActionTemplate
        multivalued: true
      equations:
        range: Equation
        multivalued: true
        inlined_as_list: true
      implementation_uri:
        range: uri
      documentation_ids:
        range: DocumentationReference
        multivalued: true

  Equation:
    description: Named equation or expression.
    attributes:
      name:
        required: true
      expression:
        required: true
      description:
      variables:
        multivalued: true

enums:
  AlgorithmTypeEnum:
    permissible_values:
      growth_curve: {}
      chemostat: {}
      turbidostat: {}
      media_requirement: {}
      pump_bolus_scheduler: {}
      od_blank_correction: {}
      growth_rate_estimator: {}
      custom: {}
